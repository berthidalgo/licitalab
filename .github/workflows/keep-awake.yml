name: Keep Render Service Awake

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes to prevent sleep on free tier
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          echo "Pinging https://licitai-peru-api.onrender.com/health to keep awake..."
          curl -f -s -o /dev/null -w "%{http_code}\n" https://licitai-peru-api.onrender.com/health || echo "Ping completed (service may be waking up)"
        continue-on-error: true
